<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <title>Icon Library</title>
  <meta name="author" content="Starexx">
  <meta name="og:title" content="Open Website (FF CRAFTLAND RELATED)">
  <meta name="og:description" content="Check out this website (ff craftland related)">
  <meta name="og:image" content="https://dl.dir.freefiremobile.com/common/web_event/crafactory4.4/images/logo_template.png">
  <meta name="theme-color" content="#CFD8DC">
  <meta name="google-site-verification" content="J20YkdBYbFS0_YZdIu9Z-sKGKzYZfqOFFkQ0numjLq0" />
  <meta name="description" content="Free Fire is a multiplayer battle royale mobile game, developed and published by Garena for Android and iOS. Battle in Style and be the last survivor!">
  <link rel="icon" type="image/x-icon" href="https://freefiremobile-a.akamaihd.net/common/web_event/common/images/ff-logo-icon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Space Mono', monospace;
      background-color: #1e1e1e;
      color: white;
    }

    /* Container for scrolling content */
    .output-container {
      height: calc(100% - 70px); /* Subtract footer height */
      overflow-y: auto;
      padding: 10px;
      box-sizing: border-box;
    }

    /* Fixed footer with input */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #121212;
      padding: 10px;
      box-sizing: border-box;
    }

    input {
      width: 100%;
      background-color: #1e1e1e;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 20px;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="output-container">
    <!-- Output Section for Scrollable Content -->
    <div id="webpGallery">
      <p>Scrollable content goes here...</p>
      <!-- You can add as much content as you want here for scrolling -->
    </div>
  </div>

  <!-- Fixed Footer Section -->
  <div class="footer">
    <input id="input_d" onchange="onSearchInputChange(this.value)" class="space-mono-regular" placeholder="Type Anything..." />
  </div>

  <script src="script.js"></script>
</body>
</html>
